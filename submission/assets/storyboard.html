<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Maybe Tomorrow. — Submission Storyboard</title>
    <style>
      :root {
        color: #141a2a;
        background: #f5efe5;
        font-family: Arial, Helvetica, sans-serif;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        padding: 42px 24px 64px;
      }

      header,
      main,
      footer {
        width: min(1180px, 100%);
        margin-inline: auto;
      }

      header {
        border-top: 12px solid #2456d6;
        border-bottom: 2px solid #141a2a;
        padding: 24px 0 28px;
      }

      h1,
      h2 {
        font-family: Georgia, "Times New Roman", serif;
      }

      h1 {
        margin: 0;
        font-size: clamp(2.5rem, 8vw, 5.5rem);
        line-height: 0.95;
      }

      header p,
      figcaption p {
        color: #4d5260;
        line-height: 1.55;
      }

      ol {
        display: grid;
        gap: 44px;
        list-style: none;
        margin: 46px 0 0;
        padding: 0;
      }

      figure {
        margin: 0;
        border-top: 5px solid #2456d6;
        padding-top: 18px;
      }

      img {
        display: block;
        width: 100%;
        height: auto;
        border: 1px solid #8f8b83;
        background: #fffaf1;
      }

      .mobile img {
        width: min(390px, 100%);
      }

      figcaption {
        display: grid;
        grid-template-columns: minmax(80px, 0.16fr) 1fr;
        gap: 20px;
        padding-top: 16px;
      }

      .number {
        display: inline-block;
        width: max-content;
        background: #d6ef3f;
        border: 1px solid #141a2a;
        padding: 6px 9px;
        font-weight: 800;
        letter-spacing: 0.12em;
      }

      h2 {
        margin: 0;
        font-size: clamp(1.8rem, 4vw, 3rem);
      }

      figcaption p { margin: 8px 0 0; }

      .thumbnails {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 24px;
        margin-top: 52px;
        border-top: 2px solid #141a2a;
        padding-top: 32px;
      }

      footer {
        margin-top: 54px;
        border-top: 2px solid #141a2a;
        padding-top: 18px;
        font-size: 0.9rem;
      }

      @media (max-width: 700px) {
        body { padding-inline: 14px; }
        figcaption { grid-template-columns: 1fr; }
        .thumbnails { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Maybe Tomorrow.<br />Submission storyboard</h1>
      <p>Eight fictional-data product frames, followed by original thumbnail assets. Open this file locally; it makes no network requests.</p>
    </header>
    <main>
      <ol>
        <li>
          <figure>
            <img src="01-home-desktop.png" alt="Desktop home screen with Check one thing as the primary action" />
            <figcaption><span class="number">01</span><div><h2>The product begins with one thing.</h2><p>No calendar is required. Optional context stays visibly secondary.</p></div></figcaption>
          </figure>
        </li>
        <li>
          <figure>
            <img src="02-verdict-desktop.png" alt="Maybe tomorrow verdict for Start another side project" />
            <figcaption><span class="number">02</span><div><h2>A deterministic brake.</h2><p>The verdict explains the explicit facts that pushed the decision.</p></div></figcaption>
          </figure>
        </li>
        <li>
          <figure>
            <img src="03-cost-of-yes-desktop.png" alt="What would need to change section with exhaustive search evidence" />
            <figcaption><span class="number">03</span><div><h2>Cost of Yes, without generated persuasion.</h2><p>The app checks all 78,125 answer combinations and preserves the original answers.</p></div></figcaption>
          </figure>
        </li>
        <li>
          <figure>
            <img src="04-sample-triage-desktop.png" alt="Fictional sample events with explicit human labels" />
            <figcaption><span class="number">04</span><div><h2>Only the human assigns meaning.</h2><p>The fictional day is pre-marked for a reproducible demo; titles are never interpreted by AI.</p></div></figcaption>
          </figure>
        </li>
        <li>
          <figure>
            <img src="05-today-map-desktop.png" alt="Today Map with occupied time, longest opening, overlap, and recovery metrics" />
            <figcaption><span class="number">05</span><div><h2>The day becomes observable, not graded.</h2><p>Four factual metrics and a chronological text agenda expose the available time structure.</p></div></figcaption>
          </figure>
        </li>
        <li>
          <figure>
            <img src="06-room-making-desktop.png" alt="Room-making preview that shortens a fictional gym event" />
            <figcaption><span class="number">06</span><div><h2>One honest trade-off.</h2><p>Shortening the fictional gym by 30 minutes creates one hour, after 18 allowed combinations are checked.</p></div></figcaption>
          </figure>
        </li>
        <li class="mobile">
          <figure>
            <img src="07-home-mobile.png" alt="Mobile home screen at 390 pixels wide" />
            <figcaption><span class="number">07</span><div><h2>The same hierarchy at mobile width.</h2><p>The capture is 390 × 844 with no horizontal overflow.</p></div></figcaption>
          </figure>
        </li>
        <li class="mobile">
          <figure>
            <img src="08-verdict-mobile.png" alt="Mobile Maybe tomorrow verdict at 390 pixels wide" />
            <figcaption><span class="number">08</span><div><h2>The decision stays legible.</h2><p>Verdict, explanation, factors, and next action remain available without sideways scrolling.</p></div></figcaption>
          </figure>
        </li>
      </ol>
      <section class="thumbnails" aria-label="Original thumbnail assets">
        <figure><img src="youtube-thumbnail.png" alt="YouTube thumbnail reading Too motivated? Maybe Tomorrow." /><figcaption><span class="number">YT</span><div><h2>YouTube 16:9</h2></div></figcaption></figure>
        <figure><img src="devpost-thumbnail.png" alt="Devpost thumbnail reading Maybe Tomorrow. An anti-planner." /><figcaption><span class="number">DP</span><div><h2>Devpost 3:2</h2></div></figcaption></figure>
      </section>
    </main>
    <footer>Fictional sample data only. Prepared for OpenAI Build Week by Codex under Yoshie Yamada's direction.</footer>
  </body>
</html>
